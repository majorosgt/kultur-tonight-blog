<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="KulturTonight theater arch icon">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#B8861F"/>
      <stop offset="0.5" stop-color="#E8B84B"/>
      <stop offset="1" stop-color="#F5C842"/>
    </linearGradient>
  </defs>
  <!-- Theater proscenium arch -->
  <path d="M6 42 L6 24 C6 13.5 14 6 24 6 C34 6 42 13.5 42 24 L42 42" stroke="url(#gold)" stroke-width="1.8" fill="none" stroke-linecap="square"/>
  <!-- Stage floor line -->
  <line x1="2" y1="42" x2="46" y2="42" stroke="url(#gold)" stroke-width="1.8" stroke-linecap="square"/>
  <!-- Left curtain inner line -->
  <path d="M6 42 L6 28 Q10 24 8 18" stroke="url(#gold)" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <!-- Right curtain inner line -->
  <path d="M42 42 L42 28 Q38 24 40 18" stroke="url(#gold)" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <!-- Center spotlight star -->
  <path d="M24 20 L25.2 23.6 L29 23.6 L26 25.8 L27.1 29.4 L24 27.2 L20.9 29.4 L22 25.8 L19 23.6 L22.8 23.6 Z" fill="url(#gold)"/>
</svg>
