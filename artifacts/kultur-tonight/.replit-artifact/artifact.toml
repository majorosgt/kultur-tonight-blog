kind = "web"
previewPath = "/"
title = "KulturTonight"
version = "1.0.0"
id = "artifacts/kultur-tonight"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18258

[services.development]
run = "pnpm --filter @workspace/kultur-tonight run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kultur-tonight", "run", "build" ]
publicDir = "artifacts/kultur-tonight/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18258"
BASE_PATH = "/"
